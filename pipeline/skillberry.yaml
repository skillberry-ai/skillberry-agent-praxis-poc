listeners:
  - name: skillberry_proxy
    address: 0.0.0.0:8080
    filter_chains:
      - skillberry_chain

filter_chains:
  - name: skillberry_chain
    filters:
      # ── Step 1: Extract Skillberry context headers into filter_metadata ───────
      - filter: context_extractor
        headers:
          - name: x-skillberry-env-id
            metadata_key: env_id
            default: "default-env"
            required: true
            pattern: "^[a-zA-Z0-9_-]+$"
            max_length: 64
          - name: x-skillberry-user-id
            metadata_key: user_id
            default: "anonymous"
            required: false
            pattern: "^[a-zA-Z0-9_-]+$"
            max_length: 64
          - name: x-skillberry-session-id
            metadata_key: session_id
            required: false
            pattern: "^[a-zA-Z0-9_-]+$"
            max_length: 128

      # ── Step 2: Resolve skill UUID from env vars or store API ─────────────────
      - filter: skill_resolver
        store_base_url: "http://localhost:8000"
        skill_uuid_env: "SKILL_UUID"
        skill_name_env: "SKILL_NAME"
        timeout_ms: 5000

      # ── Step 3: Create VMCP server and fetch MCP tools ────────────────────────
      - filter: vmcp_manager
        store_base_url: "http://localhost:8000"
        vmcp_name_template: "vmcp-{env_id}"
        timeout_ms: 10000
        always_create: true
        cleanup_on_error: false

      # ── Step 4: Inject MCP tools into the request body ────────────────────────
      - filter: mcp_tools_enricher
        timeout_ms: 5000
        tool_choice: auto
        max_body_bytes: 10485760
        on_invalid: continue

      # ── Routing ───────────────────────────────────────────────────────────────
      - filter: router
        routes:
          - path_prefix: "/"
            cluster: llm_backend

      - filter: load_balancer
        clusters:
          - name: llm_backend
            endpoints:
                - "skillberry-1.vpc.cloud9.ibm.com:4000"  # replace with your LiteLLM / OpenAI-compatible proxy address
            connection_timeout_ms: 5000
            read_timeout_ms: 60000
            write_timeout_ms: 60000

runtime:
  threads: 4
  max_connections: 10000
